<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reliablesstudio</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:248,248,252;--card:255,255,255;--alt:243,243,248;--text:28,28,30;--sub:142,142,147;--brd:229,229,234;--acc:0,122,255;--col:242,242,247;--gl:255,255,255,0.85;--glb:255,255,255,0.6}
.dark{--bg:0,0,0;--card:28,28,30;--alt:44,44,46;--text:245,245,247;--sub:142,142,147;--brd:58,58,60;--acc:10,132,255;--col:28,28,30;--gl:28,28,30,0.82;--glb:255,255,255,0.08}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','SF Pro Text','Helvetica Neue',sans-serif;background:rgb(var(--bg));color:rgb(var(--text));min-height:100vh;-webkit-font-smoothing:antialiased;-moz-osx-font-smoothing:grayscale}
/* Loading & entrance animations */
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes scaleIn{from{opacity:0;transform:scale(.95)}to{opacity:1;transform:scale(1)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes logoSpin{0%{transform:rotate(0) scale(1)}50%{transform:rotate(180deg) scale(1.1)}100%{transform:rotate(360deg) scale(1)}}
.fade-in{animation:fadeIn .4s ease-out both}
.slide-up{animation:slideUp .5s ease-out both}
.scale-in{animation:scaleIn .3s ease-out both}
.content>*{animation:fadeIn .35s ease-out both}
.glass{animation:scaleIn .25s ease-out both}
.modal-box{animation:slideUp .3s cubic-bezier(.2,.8,.3,1) both}
.login-bg .glass{animation:slideUp .6s cubic-bezier(.2,.8,.3,1) both}
.sidebar-logo .icon{transition:transform .3s}
.sidebar-logo:hover .icon{transform:rotate(8deg) scale(1.05)}
.proj-card,.b-card,.staff-card,.fin-card{transition:transform .2s cubic-bezier(.2,.8,.3,1),box-shadow .2s}
.nav-btn{transition:all .15s cubic-bezier(.2,.8,.3,1)}
.glass{background:rgba(var(--gl));backdrop-filter:blur(40px) saturate(180%);-webkit-backdrop-filter:blur(40px) saturate(180%);border:.5px solid rgba(var(--glb));border-radius:14px}
input,select,textarea{font-family:inherit}button{font-family:inherit;cursor:pointer}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(var(--sub),.2);border-radius:3px}
.login-bg{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative;overflow:hidden;background:linear-gradient(135deg,#1a1a2e,#16213e 40%,#0a3d62 70%,#0052d4)}
.dark .login-bg{background:rgb(var(--bg))}
.login-bg::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(0,122,255,.2),transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(88,86,214,.15),transparent 50%)}
.orb1,.orb2{position:absolute;border-radius:50%;filter:blur(80px);animation:fl 8s ease-in-out infinite}
.orb1{width:300px;height:300px;background:rgba(0,122,255,.12);top:10%;left:15%}
.orb2{width:200px;height:200px;background:rgba(88,86,214,.1);bottom:20%;right:20%;animation-direction:reverse;animation-duration:6s}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-20px)}}
.tab-bar{display:flex;background:rgba(var(--alt));border-radius:10px;margin-bottom:20px;border:1px solid rgba(var(--brd));overflow:hidden}
.tab-bar button{flex:1;padding:10px;border:none;background:0;color:rgb(var(--sub));font-size:13px;font-weight:600;display:flex;align-items:center;justify-content:center;gap:5px;transition:.2s}
.tab-bar button.active{background:rgba(var(--acc),.1);color:rgb(var(--acc))}
.inp-wrap{margin-bottom:14px}.inp-wrap label{font-size:12px;font-weight:600;color:rgb(var(--sub));margin-bottom:5px;display:block}
.inp-row{display:flex;align-items:center;background:rgb(var(--alt));border-radius:11px;padding:0 12px;border:1px solid rgba(var(--brd))}
.inp-row input{flex:1;border:none;background:0;padding:13px 10px;font-size:14px;color:rgb(var(--text));outline:none}
.inp-field{width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(var(--brd));background:rgb(var(--alt));color:rgb(var(--text));font-size:13.5px;outline:none;transition:border .2s}
.inp-field:focus{border-color:rgb(var(--acc))}
textarea.inp-field{resize:vertical;font-family:inherit}select.inp-field{appearance:none}
.btn-primary{width:100%;padding:14px;border-radius:12px;border:none;background:rgb(var(--acc));color:#fff;font-size:15px;font-weight:600;box-shadow:0 2px 12px rgba(var(--acc),.3);cursor:pointer;transition:transform .1s,box-shadow .2s}
.btn-primary:active{transform:scale(.98)}
.btn-pink{background:linear-gradient(135deg,#06b6d4,#0891b2);box-shadow:0 2px 12px rgba(6,182,212,.3)}
.btn-sm{padding:8px 16px;border-radius:10px;border:none;font-size:13px;font-weight:600;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;cursor:pointer;transition:transform .1s}
.btn-sm:active{transform:scale(.96)}
.err-box{background:rgba(255,59,48,.08);border-radius:10px;padding:8px 12px;margin-bottom:14px;font-size:13px;color:rgb(255,59,48);display:flex;align-items:center;gap:6px}
.app{display:flex;min-height:100vh}
.sidebar{width:240px;min-height:100vh;padding:18px 14px;border-right:.5px solid rgba(var(--brd));background:rgb(var(--card));display:flex;flex-direction:column;flex-shrink:0;transition:transform .3s}
.sidebar-logo{display:flex;align-items:center;gap:9px;margin-bottom:24px;padding:0 4px}
.sidebar-logo .icon{width:32px;height:32px;border-radius:9px;background:linear-gradient(135deg,rgb(var(--acc)),#5856d6);display:flex;align-items:center;justify-content:center}
.nav-btn{display:flex;align-items:center;gap:9px;padding:9px 12px;border-radius:10px;border:none;background:0;color:rgb(var(--sub));font-size:13.5px;font-weight:500;width:100%;text-align:left;transition:.15s}
.nav-btn:hover{background:rgba(var(--acc),.04)}
.nav-btn.active{background:rgba(var(--acc),.1);color:rgb(var(--acc));font-weight:600}
.nav-sep{font-size:10px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;letter-spacing:1px;padding:12px 12px 4px;opacity:.5}
.sidebar-footer{border-top:.5px solid rgba(var(--brd));padding-top:12px;margin-top:auto}
.sidebar-btns{display:flex;gap:5px}.sidebar-btns button{flex:1;padding:7px;border-radius:8px;border:1px solid rgba(var(--brd));background:0;color:rgb(var(--sub));display:flex;align-items:center;justify-content:center;transition:.15s}
.sidebar-btns button:hover{background:rgba(var(--acc),.05)}
.sidebar-btns .danger{color:rgb(255,59,48)}
.main{flex:1;overflow:auto;display:flex;flex-direction:column}
.topbar{padding:12px 24px;border-bottom:.5px solid rgba(var(--brd));background:rgba(var(--gl));backdrop-filter:blur(20px);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:30;flex-wrap:wrap;gap:8px}
.search-box{display:flex;align-items:center;gap:6px;padding:7px 12px;border-radius:10px;background:rgba(var(--alt));border:1px solid rgba(var(--brd));flex:1;max-width:280px}
.search-box input{border:none;background:0;outline:none;font-size:13px;color:rgb(var(--text));flex:1;min-width:0}
.filter-sel{padding:7px 10px;border-radius:8px;border:1px solid rgba(var(--brd));background:rgb(var(--card));color:rgb(var(--text));font-size:12px;outline:none}
.content{padding:20px 24px;flex:1}
.pill{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;border:none;white-space:nowrap}
.pill.sm{padding:3px 8px;font-size:11px}
.pill .dot{width:6px;height:6px;border-radius:3px}
.pri{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600}
.avatar{display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#fff;flex-shrink:0}
.bar-wrap{height:5px;border-radius:3px;background:rgba(var(--brd),.5);overflow:hidden;width:100%}
.bar-fill{height:100%;border-radius:3px;transition:width .4s}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(145px,1fr));gap:12px;margin-bottom:24px}
.card-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.proj-card{padding:18px;cursor:pointer;transition:transform .15s,box-shadow .2s;position:relative;overflow:hidden}
.proj-card:hover{transform:translateY(-2px);box-shadow:0 8px 30px rgba(0,0,0,.08)}
.dark .proj-card:hover{box-shadow:0 8px 30px rgba(0,0,0,.3)}
.board{display:flex;gap:14px;overflow-x:auto;padding-bottom:20px;min-height:calc(100vh - 220px)}
.board-col{flex:0 0 275px;min-width:255px;background:rgb(var(--col));border-radius:14px;display:flex;flex-direction:column;border:1px solid rgba(var(--brd),.5);transition:border .2s,background .2s}
.board-col.drag-over{border:2px dashed rgb(var(--acc));background:rgba(var(--acc),.04)}
.board-cards{padding:0 10px 14px;flex:1;display:flex;flex-direction:column;gap:10px;overflow-y:auto}
.b-card{background:rgb(var(--card));border-radius:12px;padding:14px;cursor:grab;border:1px solid rgba(var(--brd));transition:box-shadow .2s,transform .15s;border-left:3px solid}
.b-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.08);transform:translateY(-1px)}
.tbl-wrap{overflow-x:auto}.tbl{width:100%;border-collapse:collapse;min-width:700px}
.tbl th{padding:11px 14px;font-size:11px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;letter-spacing:.6px;text-align:left;cursor:pointer;user-select:none;white-space:nowrap;border-bottom:1.5px solid rgba(var(--brd));background:rgba(var(--alt))}
.tbl td{padding:13px 14px;border-bottom:.5px solid rgba(var(--brd),.5);font-size:13px}
.tbl tr.dr{cursor:pointer;transition:background .1s}.tbl tr.dr:hover{background:rgba(var(--acc),.03)}
.modal-overlay{position:fixed;inset:0;z-index:200;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.25);backdrop-filter:blur(12px)}.dark .modal-bg{background:rgba(0,0,0,.65)}
.modal-box{position:relative;width:100%;max-height:90vh;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 32px 80px rgba(0,0,0,.25);border-radius:20px}
.modal-head{display:flex;align-items:center;justify-content:space-between;padding:18px 22px;border-bottom:.5px solid rgba(var(--brd))}
.modal-head h2{font-size:17px;font-weight:700}
.modal-close{background:rgba(var(--alt));border:none;border-radius:8px;width:30px;height:30px;display:flex;align-items:center;justify-content:center;color:rgb(var(--sub));cursor:pointer}
.modal-body{overflow:auto;padding:18px 22px}
.form-row{display:grid;gap:10px}.form-row.c2{grid-template-columns:1fr 1fr}.form-row.c3{grid-template-columns:1fr 1fr 1fr}.form-row.c4{grid-template-columns:1fr 1fr 1fr 1fr}
.view-toggle{display:flex;background:rgba(var(--alt));border-radius:10px;border:1px solid rgba(var(--brd));overflow:hidden}
.view-toggle button{display:flex;align-items:center;gap:5px;padding:7px 14px;border:none;background:0;color:rgb(var(--sub));font-size:12.5px;font-weight:600;cursor:pointer}
.view-toggle button.active{background:rgba(var(--acc),.12);color:rgb(var(--acc))}
.team-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
.comment-list{max-height:400px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;margin-bottom:14px}
.comment-bubble{padding:12px 14px;border-radius:14px;max-width:85%}
.comment-bubble.mine{background:rgba(var(--acc),.1);border:1px solid rgba(var(--acc),.15);margin-left:auto;border-bottom-right-radius:4px}
.comment-bubble.other{background:rgba(var(--alt));border:1px solid rgba(var(--brd));margin-right:auto;border-bottom-left-radius:4px}
.comment-input-wrap{display:flex;gap:8px;align-items:flex-end}
.comment-input-wrap textarea{flex:1;padding:10px 14px;border-radius:12px;border:1px solid rgba(var(--brd));background:rgb(var(--alt));color:rgb(var(--text));font-size:13px;outline:none;resize:none;min-height:42px;max-height:100px;font-family:inherit}
.comment-send-btn{width:40px;height:40px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.comment-count{display:inline-flex;align-items:center;gap:3px;font-size:11px;color:rgb(var(--sub));background:rgba(var(--brd),.4);padding:2px 7px;border-radius:6px}
.col-edit-btn{background:0;border:none;color:rgb(var(--sub));padding:2px;cursor:pointer;opacity:.5;transition:.15s}.col-edit-btn:hover{opacity:1}
.col-label-input{font-size:13.5px;font-weight:700;border:1px solid rgba(var(--acc),.4);background:rgba(var(--acc),.05);border-radius:6px;padding:3px 8px;outline:none;color:rgb(var(--text));width:120px}
.col-color-row{display:flex;gap:4px;padding:0 14px 8px}
.col-color-dot{width:18px;height:18px;border-radius:9px;cursor:pointer;border:2px solid transparent;transition:.15s}.col-color-dot.active{border-color:rgb(var(--text))}
/* Finance */
.fin-card{padding:20px;display:flex;align-items:center;gap:14px}
.fin-icon{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center}
.fin-val{font-size:24px;font-weight:700;letter-spacing:-.5px}
.fin-lbl{font-size:11px;color:rgb(var(--sub));margin-top:1px}
.fin-tbl{width:100%;border-collapse:collapse}
.fin-tbl th{padding:10px 14px;font-size:11px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;letter-spacing:.5px;text-align:left;border-bottom:1.5px solid rgba(var(--brd));background:rgba(var(--alt))}
.fin-tbl td{padding:11px 14px;border-bottom:.5px solid rgba(var(--brd),.5);font-size:13px}
.fin-tbl tr:hover{background:rgba(var(--acc),.02)}
.profit{color:rgb(52,199,89)}.loss{color:rgb(255,59,48)}
.tag{display:inline-block;padding:2px 8px;border-radius:5px;font-size:11px;font-weight:600}
/* Staff */
.staff-card{padding:22px}
.staff-detail{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:12px}
.staff-detail-item{padding:10px;border-radius:10px;background:rgba(var(--alt));border:1px solid rgba(var(--brd))}
.staff-detail-item .lbl{font-size:10px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase;letter-spacing:.5px}
.staff-detail-item .val{font-size:14px;font-weight:600;margin-top:2px}
/* Monday-style board */
.mboard{overflow-x:auto;border-radius:14px}
.mboard table{width:100%;border-collapse:collapse;min-width:700px}
.mboard th{padding:10px 14px;font-size:12px;font-weight:600;color:rgb(var(--sub));text-align:left;border-bottom:2px solid rgba(var(--brd));background:rgba(var(--alt));white-space:nowrap;position:relative;user-select:none}
.mboard th .cmb{opacity:0;transition:.15s;background:0;border:none;color:rgb(var(--sub));cursor:pointer;padding:2px}
.mboard th:hover .cmb{opacity:1}
.mboard th .col-resize{position:absolute;right:0;top:0;bottom:0;width:5px;cursor:col-resize;z-index:5;background:transparent;transition:background .15s}
.mboard th .col-resize:hover,.mboard th .col-resize.active{background:rgb(var(--acc));width:3px}
.mboard th .col-resize::after{content:'';position:absolute;right:-2px;top:50%;transform:translateY(-50%);width:0;height:0;opacity:0;transition:.15s}
.mboard th:hover .col-resize::after{opacity:1}
.mboard td{padding:0;border-bottom:.5px solid rgba(var(--brd),.4);font-size:13px;vertical-align:middle}
.mboard tr:hover td{background:rgba(var(--acc),.02)}
.mboard .ce{width:100%;border:none;background:0;color:rgb(var(--text));font-size:13px;outline:none;padding:9px 14px;font-family:inherit}
.mboard .ce:focus{box-shadow:inset 0 0 0 2px rgb(var(--acc))}
.mboard .sc{padding:7px 12px;border-radius:0;text-align:center;font-size:12px;font-weight:600;color:white;cursor:pointer;white-space:nowrap;display:block;width:100%}
.mboard .ar{opacity:.4;cursor:pointer;transition:.15s}.mboard .ar:hover{opacity:1}
.mboard .ac{width:40px;min-width:40px;text-align:center;cursor:pointer;border-left:1px solid rgba(var(--brd),.3)}
.mboard .gh{padding:12px 16px;font-size:16px;font-weight:700;cursor:pointer;display:flex;align-items:center;gap:8px;border-bottom:2px solid}
.cm{position:absolute;top:calc(100% + 2px);right:0;z-index:70;padding:4px;min-width:160px;box-shadow:0 8px 32px rgba(0,0,0,.15);border-radius:10px}
.cm button{display:flex;align-items:center;gap:8px;width:100%;padding:8px 10px;border:none;background:0;border-radius:6px;cursor:pointer;color:rgb(var(--text));font-size:12.5px;text-align:left}
.cm button:hover{background:rgba(var(--acc),.06)}
.cm .dng{color:rgb(255,59,48)}
/* Status Popup — 5-col grid like Monday.com */
.sp-overlay{position:fixed;inset:0;z-index:90}
.sp{position:absolute;z-index:95;padding:14px;min-width:min(92vw,580px);max-width:92vw;box-shadow:0 16px 64px rgba(0,0,0,.3);border-radius:14px}
.sp::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);width:12px;height:12px;background:rgba(var(--gl));rotate:45deg;border-left:.5px solid rgba(var(--glb));border-top:.5px solid rgba(var(--glb))}
.sp .sp-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:5px;margin-bottom:8px}
.sp .sp-opt{padding:8px 4px;border-radius:5px;text-align:center;font-size:11px;font-weight:600;color:white;cursor:pointer;transition:transform .1s,opacity .15s;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp .sp-opt:hover{opacity:.85;transform:scale(1.04)}
.sp .sp-opt:active{transform:scale(.96)}
.sp .sp-clear{grid-column:1/-1;padding:7px;border-radius:5px;text-align:center;font-size:11.5px;font-weight:600;color:rgb(var(--sub));background:rgba(var(--brd),.3);cursor:pointer;margin-top:3px}
.sp .sp-edit{display:flex;align-items:center;justify-content:center;gap:6px;padding:10px;font-size:12.5px;color:rgb(var(--sub));cursor:pointer;border-top:.5px solid rgba(var(--brd));margin-top:6px}
.sp .sp-edit:hover{color:rgb(var(--acc))}
/* Mobile hamburger */
.menu-toggle{display:none;background:0;border:none;color:rgb(var(--text));padding:4px}
/* ─── RESPONSIVE ─── */
@media(max-width:1024px){
  .sidebar{width:210px}
  .content{padding:16px}
  .card-grid{grid-template-columns:repeat(auto-fill,minmax(240px,1fr))}
  .team-grid{grid-template-columns:repeat(auto-fill,minmax(260px,1fr))}
  .stats{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}
  .form-row.c3{grid-template-columns:1fr 1fr}
  .form-row.c4{grid-template-columns:1fr 1fr}
}
@media(max-width:768px){
  .app{flex-direction:column}
  .sidebar{position:fixed;left:0;top:0;bottom:0;z-index:100;width:260px;transform:translateX(-100%);box-shadow:8px 0 32px rgba(0,0,0,.15)}
  .sidebar.open{transform:translateX(0)}
  .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99}
  .sidebar-overlay.show{display:block}
  .menu-toggle{display:flex}
  .main{width:100%}
  .topbar{padding:10px 16px}
  .content{padding:14px 16px}
  .search-box{max-width:100%}
  .card-grid{grid-template-columns:1fr}
  .team-grid{grid-template-columns:1fr}
  .board{flex-direction:column;min-height:auto}
  .board-col{flex:none;width:100%;min-width:auto}
  .form-row.c2,.form-row.c3,.form-row.c4{grid-template-columns:1fr}
  .modal-box{max-width:100%;margin:10px;border-radius:16px}
  .fin-card{padding:14px;gap:10px}
  .fin-val{font-size:20px}
  .rota-summary{grid-template-columns:repeat(2,1fr)}
  .sp .sp-grid{grid-template-columns:repeat(3,1fr)}
  .sp{min-width:min(95vw,400px)}
  .chat-container{height:calc(100vh - 140px)}
  .comment-bubble{max-width:95%}
  .staff-detail{grid-template-columns:1fr}
}
@media(max-width:480px){
  .content{padding:12px}
  .topbar{padding:8px 12px}
  .sp .sp-grid{grid-template-columns:repeat(2,1fr)}
  .rota-summary{grid-template-columns:1fr 1fr}
  .btn-sm{padding:7px 12px;font-size:12px}
  .view-toggle button{padding:6px 10px;font-size:11.5px}
}
/* Mention */
.mention{color:rgb(var(--acc));font-weight:600;background:rgba(var(--acc),.08);padding:0 3px;border-radius:3px}
/* Notif bell bounce */
@keyframes bellBounce{0%,100%{transform:rotate(0)}25%{transform:rotate(12deg)}50%{transform:rotate(-8deg)}75%{transform:rotate(4deg)}}
.bell-anim{animation:bellBounce .5s ease}
/* Rota */
.rota-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(48px,1fr));gap:4px}
.rota-day{text-align:center;padding:6px 2px;border-radius:8px;font-size:11px;border:1px solid rgba(var(--brd),.5)}
.rota-day.today{border:2px solid rgb(var(--acc))}
.rota-day .dnum{font-weight:700;font-size:13px;margin-bottom:2px}
.rota-day .dlbl{font-size:9px;color:rgb(var(--sub))}
.rota-day.has-clock{background:rgba(52,199,89,.08)}
.rota-entry{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-bottom:.5px solid rgba(var(--brd),.5)}
.rota-entry:last-child{border-bottom:none}
.clock-btn{padding:10px 20px;border-radius:12px;border:none;font-size:14px;font-weight:600;display:flex;align-items:center;gap:6px}
.clock-in-btn{background:linear-gradient(135deg,#22c55e,#16a34a);color:white;box-shadow:0 4px 16px rgba(34,197,94,.3)}
.clock-out-btn{background:linear-gradient(135deg,#ef4444,#dc2626);color:white;box-shadow:0 4px 16px rgba(239,68,68,.3)}
.month-nav{display:flex;align-items:center;gap:12px;margin-bottom:18px}
.month-nav button{background:rgba(var(--alt));border:1px solid rgba(var(--brd));border-radius:10px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;color:rgb(var(--sub));cursor:pointer}
.month-nav h3{font-size:17px;font-weight:700;min-width:180px;text-align:center}
/* Leave */
.leave-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:6px;font-size:11px;font-weight:600}
.leave-urgent{background:rgba(255,59,48,.1);color:rgb(255,59,48)}
.leave-sick{background:rgba(255,159,10,.1);color:rgb(255,159,10)}
.leave-holiday{background:rgba(14,165,233,.1);color:rgb(14,165,233)}
.leave-personal{background:rgba(168,85,247,.1);color:rgb(168,85,247)}
.leave-pending{background:rgba(255,159,10,.1);color:rgb(255,159,10)}
.leave-approved{background:rgba(52,199,89,.1);color:rgb(52,199,89)}
.leave-rejected{background:rgba(255,59,48,.1);color:rgb(255,59,48)}
.work-log{font-size:11.5px;color:rgb(var(--sub));margin-top:3px;padding-left:2px;font-style:italic}
.rota-summary{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;margin-bottom:20px}
/* Chat */
.chat-list-item{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:.5px solid rgba(var(--brd),.5);cursor:pointer;transition:background .1s}
.chat-list-item:hover{background:rgba(var(--acc),.03)}
.chat-list-item.unread{background:rgba(var(--acc),.04)}
.chat-preview{font-size:12px;color:rgb(var(--sub));overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:200px}
.chat-time{font-size:10px;color:rgb(var(--sub));white-space:nowrap}
.chat-unread-dot{width:8px;height:8px;border-radius:4px;background:rgb(var(--acc));flex-shrink:0}
.chat-container{display:flex;flex-direction:column;height:calc(100vh - 180px);max-height:700px}
.chat-header{display:flex;align-items:center;gap:12px;padding:16px 20px;border-bottom:.5px solid rgba(var(--brd))}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:8px}
.chat-msg{padding:10px 14px;border-radius:14px;max-width:75%;font-size:13.5px;line-height:1.5}
.chat-msg.sent{background:rgba(var(--acc),.12);border:1px solid rgba(var(--acc),.15);margin-left:auto;border-bottom-right-radius:4px}
.chat-msg.received{background:rgba(var(--alt));border:1px solid rgba(var(--brd));margin-right:auto;border-bottom-left-radius:4px}
.chat-msg .sender{font-size:11px;font-weight:600;margin-bottom:3px}
.chat-msg .time{font-size:10px;color:rgb(var(--sub));margin-top:4px;text-align:right}
.chat-input-bar{display:flex;gap:8px;padding:14px 20px;border-top:.5px solid rgba(var(--brd));align-items:flex-end}
.chat-input-bar textarea{flex:1;padding:10px 14px;border-radius:12px;border:1px solid rgba(var(--brd));background:rgb(var(--alt));color:rgb(var(--text));font-size:13px;outline:none;resize:none;min-height:42px;max-height:100px;font-family:inherit}
.chat-send{width:42px;height:42px;border-radius:12px;border:none;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:white;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer}
@media(max-width:768px){.sidebar{display:none}.board{flex-direction:column}.board-col{flex:none;min-width:auto}.form-row.c2,.form-row.c3,.form-row.c4{grid-template-columns:1fr}.tbl,.fin-tbl{min-width:600px}.staff-detail{grid-template-columns:1fr}}
</style>

function getRole(rid){return(S.data.roles||[]).find(r=>r.id===rid);}
function hasPerm(uid,perm){const u=typeof uid==="object"?uid:gU(uid);if(!u)return false;if(u.role==="admin")return true;const r=getRole(u.role);return r?(r.permissions||[]).includes(perm):false;}
function can(perm){return S.user?hasPerm(S.user,perm):false;}
function addRole(){if(!S.data.roles)S.data.roles=[];const id="role_"+Date.now();S.data.roles.push({id,name:"New Role",color:COLOR_OPTS[S.data.roles.length%COLOR_OPTS.length],permissions:["dashboard","projects","status_change"]});save();render();}
function deleteRole(id){if(id==="admin"||id==="client")return;S.data.roles=(S.data.roles||[]).filter(r=>r.id!==id);S.data.users.forEach(u=>{if(u.role===id)u.role="editor";});save();render();}
function togglePerm(roleId,perm){if(roleId==="admin")return;const r=getRole(roleId);if(!r)return;if(!r.permissions)r.permissions=[];const i=r.permissions.indexOf(perm);if(i>=0)r.permissions.splice(i,1);else r.permissions.push(perm);save();render();}
function renameRole(id,name){const r=getRole(id);if(r)r.name=name;save();}
function recolorRole(id,color){const r=getRole(id);if(r)r.color=color;save();render();}
function nav(view){document.querySelector('.sidebar')?.classList.remove('open');document.querySelector('.sidebar-overlay')?.classList.remove('show');S.view=view;S.wsOpen=false;render();}
function av(uid,sz=26){const u=gU(uid);if(!u)return`<span class="avatar" style="width:${sz}px;height:${sz}px;border-radius:${sz/3}px;background:rgba(var(--brd));font-size:${sz*.38}px;color:rgb(var(--sub))">?</span>`;return`<span class="avatar" title="${e(u.name)}" style="width:${sz}px;height:${sz}px;border-radius:${sz/3}px;background:linear-gradient(135deg,rgba(${u.color},.9),rgba(${u.color},.6));font-size:${sz*.38}px">${e(u.avatar)}</span>`;}
function pill(st,sm){const s=getSt(st);return`<span class="pill${sm?" sm":""}" style="background:rgba(${s.color},.12);color:rgb(${s.color})"><span class="dot" style="background:rgb(${s.color})"></span>${e(s.label)}</span>`;}
function pri(p){const c=PRI[p]||PRI.medium;return`<span class="pri" style="color:rgb(${c.color})">${c.emoji} ${c.label}</span>`;}
function bar(v,c,h=5){return`<div class="bar-wrap" style="height:${h}px"><div class="bar-fill" style="width:${v||0}%;background:rgb(${c||"var(--acc)"})"></div></div>`;}
function fmt(n){return"£"+Number(n||0).toLocaleString("en-GB",{minimumFractionDigits:0,maximumFractionDigits:0});}
function fmtTime(t){const d=new Date(t),now=new Date(),diff=Math.floor((now-d)/1e3);if(diff<60)return"Just now";if(diff<3600)return~~(diff/60)+"m ago";if(diff<86400)return~~(diff/3600)+"h ago";return d.toLocaleDateString("en-GB",{day:"numeric",month:"short"})+" "+d.toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"});}

function addComment(pid,text){const p=S.data.projects.find(x=>x.id===pid);if(!p||!text.trim())return;if(!p.comments)p.comments=[];p.comments.push({id:"cm"+Date.now(),userId:S.user.id,text:text.trim(),time:new Date().toISOString()});detectMentions(text.trim(),pid);save();render();}

function paidTotal(p){return(p.payments||[]).reduce((s,x)=>s+Number(x.amount||0),0);}
function dueAmount(p){return(p.revenue||0)-paidTotal(p);}
function togglePayStatus(pid){const p=S.data.projects.find(x=>x.id===pid);if(!p)return;const cyc=["unpaid","partial","paid"];p.paymentStatus=cyc[(cyc.indexOf(p.paymentStatus)+1)%3];save();render();}
function addPayment(pid){const p=S.data.projects.find(x=>x.id===pid);if(!p)return;if(!p.payments)p.payments=[];const f=S.form;const amt=Number(f.payAmount)||0;p.payments.push({id:"pay"+Date.now(),amount:amt,date:f.payDate||new Date().toISOString().slice(0,10),method:f.payMethod||"Bank Transfer",bankAccount:f.payBank||"",note:f.payNote||""});const paid=paidTotal(p);p.paymentStatus=paid>=p.revenue?"paid":paid>0?"partial":"unpaid";notifyClientPayment(pid,amt);S.modal=null;S.form={};save();render();}

// ─── STATUS POPUP ───
function openStatusPopup(ev,type,pid,colId){
  ev.stopPropagation();
  const old=document.getElementById("statusPopup");if(old)old.remove();
  const oldOv=document.getElementById("spOverlay");if(oldOv)oldOv.remove();

  const rect=ev.currentTarget.getBoundingClientRect();
  let options=[],currentVal="",editType="",editId="";

  if(type==="proj"){
    const p=S.data.projects.find(x=>x.id===pid);
    options=S.data.statuses.map(s=>({label:s.label,color:"rgb("+s.color+")",key:s.key}));
    currentVal=p?.status||"";
    editType="projStatus";editId="";
  } else {
    const col=S.data.boardColumns.find(x=>x.id===colId);
    const p=S.data.projects.find(x=>x.id===pid);
    options=(col?.options||[]).map(o=>({label:o.label,color:o.color,key:o.label}));
    currentVal=(p?.customFields||{})[colId]||"";
    editType="colStatus";editId=colId;
  }

  const ov=document.createElement("div");ov.id="spOverlay";ov.className="sp-overlay";
  ov.onclick=()=>{ov.remove();document.getElementById("statusPopup")?.remove();};
  document.body.appendChild(ov);

  const popup=document.createElement("div");popup.id="statusPopup";popup.className="sp glass";
  const left=Math.min(rect.left+rect.width/2-140,window.innerWidth-300);
  const top=rect.bottom+8;
  popup.style.cssText="left:"+Math.max(8,left)+"px;top:"+top+"px;position:fixed;opacity:0;transform:translateY(-8px);transition:opacity .2s,transform .2s;";
  requestAnimationFrame(()=>{popup.style.opacity="1";popup.style.transform="translateY(0)";});

  let html='<div class="sp-grid">';
  options.forEach(o=>{
    html+='<div class="sp-opt" style="background:'+o.color+'" data-key="'+o.key+'">'+o.label+'</div>';
  });
  html+='<div class="sp-clear" data-key="">— Clear —</div>';
  html+='</div>';
  // Always show Edit Labels
  if(editType==="colStatus"){
    html+='<div class="sp-edit" onclick="document.getElementById(\'spOverlay\')?.remove();document.getElementById(\'statusPopup\')?.remove();S.modal=\'editColStatus\';S.form={colId:\''+editId+'\'};render()">'+ic("edit",13)+' Edit Labels</div>';
  } else {
    html+='<div class="sp-edit" onclick="document.getElementById(\'spOverlay\')?.remove();document.getElementById(\'statusPopup\')?.remove();S.modal=\'editProjStatuses\';render()">'+ic("edit",13)+' Edit Labels</div>';
  }
  popup.innerHTML=html;
  document.body.appendChild(popup);

  popup.querySelectorAll(".sp-opt,.sp-clear").forEach(el=>{
    el.addEventListener("click",()=>{
      const key=el.dataset.key;
      if(type==="proj"){
        if(key)updStatus(pid,key);
      } else {
        setCellVal(pid,colId,key);
        render();
      }
      ov.remove();popup.remove();
    });
  });
}

function getUnreadCount(clientId,forUserId){
  const msgs=getClientChats(clientId);
  // Simple: count messages from the OTHER side that are newer than 24h (approximation for unread)

async function resetPassword(email,pw,pwc){
  S.loginErr="";S.resetMsg="";
  if(!email||!pw||!pwc){S.loginErr="All fields are required";render();return;}
  if(pw!==pwc){S.loginErr="Passwords do not match";render();return;}
  if(pw.length<4){S.loginErr="Password must be at least 4 characters";render();return;}
  // Try API first
  try{
    const resp=await fetch('/api/auth/reset-password',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({email,password:pw})});
    if(resp.ok){S.resetMsg="Password reset successfully! You can now sign in.";S.loginErr="";render();return;}
    const err=await resp.json();S.loginErr=err.error||"Reset failed";render();return;
  }catch(e){}
  // Fallback to local
  const u=S.data.users.find(x=>x.email===email);
  if(!u){S.loginErr="No account found with this email";render();return;}
  u.password=pw;
  S.resetMsg="Password reset successfully! You can now sign in.";
  S.loginErr="";
  save();render();
}

      </div>
      ${can("workspaces")?`<div style="border-top:.5px solid rgba(var(--brd));padding:8px 10px"><button onclick="addWorkspace()" style="width:100%;padding:8px;border-radius:8px;border:none;background:rgba(var(--acc),.08);color:rgb(var(--acc));font-size:12px;font-weight:600;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:4px">${ic("plus",12)} Add workspace</button></div>`:""}
    </div>`:""}</div>`:""}`; 

  if(can("projects"))sb+=`<button class="nav-btn${S.view==="projects"?" active":""}" onclick="nav('projects')">${ic("columns",17)} ${isC?"My Projects":"Projects"}</button>`;

  if(can("financials")||can("payments")||can("expenses")){sb+=`<div class="nav-sep">Finance</div>`;

    if(can("payments"))sb+=`<button class="nav-btn${S.view==="payments"?" active":""}" onclick="nav('payments')">${ic("wallet",17)} Payments</button>`;
    if(can("expenses"))sb+=`<button class="nav-btn${S.view==="expenses"?" active":""}" onclick="nav('expenses')">${ic("receipt",17)} Expenses</button>`;}

  if(can("staff")||can("rota")||can("clients")){sb+=`<div class="nav-sep">People</div>`;

    if(can("rota"))sb+=`<button class="nav-btn${S.view==="rota"?" active":""}" onclick="nav('rota')">${ic("clock",17)} Rota</button>`;
    if(can("clients"))sb+=`<button class="nav-btn${S.view==="clients"?" active":""}" onclick="nav('clients')">${ic("heart",17)} Clients</button>`;}

  const myNotifCount=myUnreadNotifs();

  const canCreate=can("projects_create");
  let tb=`<div class="topbar"><button class="menu-toggle" onclick="document.querySelector('.sidebar').classList.toggle('open');document.querySelector('.sidebar-overlay')?.classList.toggle('show')">${ic("menu",22)}</button><div style="display:flex;align-items:center;gap:8px;flex:1;min-width:120px;flex-wrap:wrap"><div class="search-box">${ic("search",14,"rgb(var(--sub))")}<input id="sI" placeholder="Search..." value="${e(S.search)}" oninput="S.search=this.value;render()"></div>
  ${!isC?`<select class="filter-sel" onchange="S.fPri=this.value;render()"><option value="all">All Priorities</option>${Object.entries(PRI).map(([k,v])=>`<option value="${k}"${S.fPri===k?" selected":""}>${v.label}</option>`).join("")}</select>`:""}</div>
  <div style="display:flex;align-items:center;gap:8px">
  ${canCreate&&!isC?`<button class="btn-sm" style="background:rgb(var(--acc));color:white" onclick="S.form={status:S.data.statuses[0]?.key||'editing_running',priority:'medium',progress:0,revenue:0,editorPayout:0};S.modal='project';render()">${ic("plus",15,"white")} New Project</button>`:""}
  ${isC?`<button class="btn-sm" style="background:linear-gradient(135deg,#06b6d4,#0891b2);color:white" onclick="S.form={status:S.data.statuses[0]?.key,priority:'medium',progress:0,clientId:S.user.id};S.modal='clientSubmit';render()">${ic("send",15,"white")} Submit Project</button>`:""}</div></div>`;

  let ct="";
  if(S.view==="dashboard"&&can("dashboard")) ct=rDash(filt,isA,isC,isE);
  else if(S.view==="projects"&&can("projects")) ct=rProjects(filt,can("projects_create")||can("projects_edit"),isC,isE);
  else if(S.view==="financials"&&can("financials")) ct=rFinancials();
  else if(S.view==="payments"&&can("payments")) ct=rPayments();
  else if(S.view==="expenses"&&can("expenses")) ct=rExpenses();
  else if(S.view==="staff"&&can("staff")) ct=rStaff();
  else if(S.view==="rota"&&can("rota")) ct=rAdminRota();
  else if(S.view==="myrota"&&can("my_rota")) ct=rMyRota();
  else if(S.view==="chat"&&can("messages")&&isC) ct=rClientChat();
  else if(S.view==="clientPayments"&&can("my_payments")) ct=rClientPayments();
  else if(S.view==="mynotifs") ct=rMyNotifs();
  else if(S.view==="chats"&&can("messages")&&isA) ct=rAdminChats();
  else if(S.view==="clients"&&can("clients")) ct=rClients();
  else if(S.view==="workspaces"&&can("workspaces")) ct=rManageWorkspaces();
  else if(S.view==="banks"&&can("bank_accounts")) ct=rBanks();
  else if(S.view==="roles"&&can("roles_manage")) ct=rRoles();

  return`<div class="app"><div class="sidebar-overlay" onclick="document.querySelector('.sidebar').classList.remove('open');this.classList.remove('show')"></div>${sb}<div class="main">${tb}<div class="content">${ct}</div></div></div>${S.modal?rModal():""}`;
}

function projCard(p,isA){const ed=gU(p.assignedTo),cl=gU(p.clientId),dl=dU(p.deadline),sc=getSt(p.status),cc=(p.comments||[]).length;
return`<div class="proj-card glass" onclick="S.selProj={id:'${p.id}'};render()"><div style="position:absolute;top:0;left:0;right:0;height:3px;background:rgb(${sc.color});border-radius:16px 16px 0 0"></div>
<div style="display:flex;justify-content:space-between;margin-bottom:8px"><h3 style="font-size:14px;font-weight:600;flex:1">${e(p.eventName)}</h3>${isA?`<button onclick="event.stopPropagation();S.form={...S.data.projects.find(x=>x.id==='${p.id}')};S.modal='project';render()" style="background:0;border:none;color:rgb(var(--sub));padding:2px">${ic("more",14)}</button>`:""}</div>
${cl?`<div style="font-size:11px;color:rgb(var(--sub));margin-bottom:6px;display:flex;align-items:center;gap:4px">${ic("heart",10,"rgb(244,63,94)")} ${e(cl.name)}</div>`:""}
<div style="display:flex;gap:6px;margin-bottom:10px;flex-wrap:wrap">${p.workspace?wsBadge(p.workspace,true)+" ":""}${pill(p.status,true)} ${pri(p.priority)}</div>
${bar(p.progress,sc.color)}<div style="font-size:10px;color:rgb(var(--sub));margin-top:2px;text-align:right">${p.progress||0}%</div>
<div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px"><div style="display:flex;align-items:center;gap:5px">${p.assignedTo?av(p.assignedTo,20):""}<span style="font-size:11px;color:rgb(var(--sub))">${ed?e(ed.name.split(" ")[0]):"Unassigned"}</span></div><div style="display:flex;align-items:center;gap:8px">${cc?`<span class="comment-count">${ic("msg",10)} ${cc}</span>`:""}<span style="font-size:11px;color:${dl.over?"rgb(255,59,48)":"rgb(var(--sub))"};display:flex;align-items:center;gap:3px">${ic("clock",10)} ${dl.text}</span></div></div></div>`;}

function rDash(filt,isA,isC,isE){
  const allP=S.data.projects,allExp=S.data.expenses;
  const totalRev=allP.reduce((s,p)=>s+(p.revenue||0),0);
  const totalPay=allP.reduce((s,p)=>s+(p.editorPayout||0),0);
  const totalExp=allExp.reduce((s,x)=>s+(x.amount||0),0);
  const totalProfit=totalRev-totalPay-totalExp;
  let h=`<h2 style="margin-bottom:18px;font-size:20px;font-weight:700">${isC?"Welcome, "+e(S.user.name.split(" ")[0]):isE?"My Tasks":"Overview"}</h2>`;
  if(isA){h+=`<div class="stats">${[
    {l:"Revenue",v:fmt(totalRev),c:"52,199,89",i:"trending"},
    {l:"Payouts",v:fmt(totalPay),c:"0,122,255",i:"download"},
    {l:"Expenses",v:fmt(totalExp),c:"255,159,10",i:"receipt"},
    {l:"Net Profit",v:fmt(totalProfit),c:totalProfit>=0?"52,199,89":"255,59,48",i:"dollar"},
    {l:"Projects",v:allP.length,c:"99,102,241",i:"film"},
    {l:"Clients",v:cls().length,c:"236,72,153",i:"heart"},
  ].map(s=>`<div class="fin-card glass"><div class="fin-icon" style="background:rgba(${s.c},.1)">${ic(s.i,17,`rgb(${s.c})`)}</div><div><div class="fin-val" style="color:rgb(${s.c})">${s.v}</div><div class="fin-lbl">${s.l}</div></div></div>`).join("")}</div>`;}
  if(isC)h+=`<div class="glass" style="padding:24px;margin-bottom:20px;border:1px solid rgba(6,182,212,.1);background:rgba(6,182,212,.04)"><div style="display:flex;align-items:center;gap:12px;margin-bottom:12px"><div style="width:44px;height:44px;border-radius:14px;background:linear-gradient(135deg,#06b6d4,#0891b2);display:flex;align-items:center;justify-content:center">${ic("heart",20,"white")}</div><div><div style="font-size:16px;font-weight:700">Submit a New Project</div><div style="font-size:13px;color:rgb(var(--sub))">Share your footage — we'll handle the rest!</div></div></div><button class="btn-sm" style="background:linear-gradient(135deg,#06b6d4,#0891b2);color:white;padding:10px 20px;font-size:14px" onclick="S.form={status:S.data.statuses[0]?.key,priority:'medium',progress:0,clientId:S.user.id};S.modal='clientSubmit';render()">${ic("send",15,"white")} Submit New Project</button></div>`;
  h+=`<div class="card-grid">${filt.map(p=>projCard(p,isA)).join("")}${filt.length===0?`<div style="grid-column:1/-1;text-align:center;padding:48px;color:rgb(var(--sub))"><div style="opacity:.2;margin-bottom:8px">${ic("film",32)}</div><div style="font-size:13px">${isC?"No projects yet!":"No projects found"}</div></div>`:""}</div>`;
  return h;
}

function rProjects(filt,isA,isC,isE){
  let h=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px;flex-wrap:wrap;gap:10px"><h2 style="font-size:20px;font-weight:700">${isC?"My Projects":isA?"All Projects":"My Tasks"}</h2>`;
  if(!isC)h+=`<div class="view-toggle"><button class="${S.pView==="monday"?"active":""}" onclick="S.pView='monday';render()">${ic("table",14)} Main Table</button><button class="${S.pView==="board"?"active":""}" onclick="S.pView='board';render()">${ic("columns",14)} Kanban</button></div>`;
  h+=`</div>`;

  // ─── MONDAY.COM-STYLE TABLE ───
  if(S.pView==="monday"||isC){
    const cols=S.data.boardColumns||[];
    // Group by workspace
    const wsGroups=[];
    if(S.activeWs!=="all"){
      const w=getWs(S.activeWs);
      wsGroups.push({ws:w,projects:filt});
    } else {
      const used=new Set();
      (S.data.workspaces||[]).forEach(w=>{
        const wp=filt.filter(p=>p.workspace===w.id);
        if(wp.length){wsGroups.push({ws:w,projects:wp});wp.forEach(p=>used.add(p.id));}
      });
      const noWs=filt.filter(p=>!used.has(p.id));
      if(noWs.length)wsGroups.push({ws:{id:"none",name:"Unassigned",color:"var(--sub)",icon:"film"},projects:noWs});
    }

    wsGroups.forEach(g=>{
      h+=`<div class="glass mboard" style="margin-bottom:20px;padding:0;overflow:hidden">
      <div class="gh" style="border-color:rgb(${g.ws.color});color:rgb(${g.ws.color})">${ic("chevDown",14)} ${e(g.ws.name)} <span style="font-size:12px;font-weight:500;color:rgb(var(--sub))">${g.projects.length} project${g.projects.length!==1?"s":""}</span></div>
      <div style="overflow-x:auto"><table style="width:100%;border-collapse:collapse;min-width:${400+cols.length*160}px">
      <thead><tr>
        <th style="min-width:40px;width:40px;padding:10px 8px"></th>
        <th style="min-width:220px">Client Name</th>
        <th style="min-width:100px">Status</th>
        ${cols.map(c=>`<th style="min-width:100px;position:relative;${(S.colWidths||{})[c.id]?"width:"+S.colWidths[c.id]+"px":""}" data-colid="${c.id}">${S.editingColKey===c.id?`<input class="ce" value="${e(c.name)}" onblur="renameBoardCol('${c.id}',this.value);S.editingColKey=null;render()" onkeydown="if(event.key==='Enter'){renameBoardCol('${c.id}',this.value);S.editingColKey=null;render()}" style="font-weight:600;padding:4px 8px;width:110px" onclick="event.stopPropagation()">`:e(c.name)} <button class="cmb" onclick="event.stopPropagation();S.colMenu=S.colMenu==='${c.id}'?null:'${c.id}';render()">${ic("more",12)}</button>${S.colMenu===c.id?`<div class="cm glass" onclick="event.stopPropagation()"><button onclick="S.editingColKey='${c.id}';S.colMenu=null;render()">${ic("edit",13)} Rename</button>${c.type==="status"?`<button onclick="S.colMenu=null;S.modal='editColStatus';S.form={colId:'${c.id}'};render()">${ic("eye",13)} Edit Options</button>`:""}<button class="dng" onclick="if(confirm('Delete column?'))deleteBoardCol('${c.id}')">${ic("trash",13)} Delete</button></div>`:""}<div class="col-resize" data-colid="${c.id}"></div></th>`).join("")}
        ${isA?`<th class="ac" onclick="S.modal='addColType';render()" title="Add column" style="cursor:pointer;color:rgb(var(--sub))">${ic("plus",16)}</th>`:""}
      </tr></thead>
      <tbody>
      ${g.projects.map(p=>{const sc=getSt(p.status);const ed=gU(p.assignedTo);
        return`<tr>
          <td style="padding:8px;text-align:center"><input type="checkbox" style="width:16px;height:16px;cursor:pointer;accent-color:rgb(${g.ws.color})"></td>
          <td style="padding:0"><div style="display:flex;align-items:center;gap:8px;padding:8px 14px;cursor:pointer" onclick="S.selProj={id:'${p.id}'};render()">${ed?av(p.assignedTo,22):""}<div><div style="font-weight:600;font-size:13px">${e(p.eventName)}</div></div></div></td>
          <td style="padding:0;position:relative" onclick="event.stopPropagation()"><div class="sc" style="background:rgb(${sc.color});padding:7px 12px;text-align:center;font-size:12px;font-weight:600;color:white;cursor:pointer" onclick="openStatusPopup(event,'proj','${p.id}')">${e(sc.label)}</div></td>
          ${cols.map(c=>{
            const val=(p.customFields||{})[c.id]||"";
            if(c.type==="status"){
              const opt=(c.options||[]).find(o=>o.label===val);
              const bg=opt?opt.color:"transparent";const txtC=opt?"white":"rgb(var(--sub))";
              return`<td style="padding:0;position:relative" onclick="event.stopPropagation()"><div style="background:${bg};padding:7px 12px;text-align:center;font-size:12px;font-weight:600;color:${txtC};cursor:pointer;min-height:34px" onclick="openStatusPopup(event,'col','${p.id}','${c.id}')">${e(val)||"—"}</div></td>`;
            }
            if(c.type==="link"){
              return`<td style="padding:0" onclick="event.stopPropagation()"><div style="padding:4px 10px">${val?`<a href="${e(val)}" target="_blank" style="color:rgb(var(--acc));font-size:12px;display:flex;align-items:center;gap:4px;text-decoration:none">${ic("extLink",13,"rgb(var(--acc))")} Link</a>`:`<input class="ce" placeholder="Paste URL..." value="" onchange="setCellVal('${p.id}','${c.id}',this.value)" style="font-size:12px">`}</div></td>`;
            }
            return`<td style="padding:0" onclick="event.stopPropagation()"><input class="ce" value="${e(val)}" onchange="setCellVal('${p.id}','${c.id}',this.value)"></td>`;
          }).join("")}
          ${isA?`<td class="ac" onclick="event.stopPropagation()"><button onclick="if(confirm('Delete project \\'${e(p.eventName).replace(/'/g,"\\'")}\\' permanently?'))delProj('${p.id}')" style="background:0;border:none;color:rgb(var(--sub));padding:4px;cursor:pointer;opacity:.3;transition:.15s" onmouseenter="this.style.opacity='1';this.style.color='rgb(255,59,48)'" onmouseleave="this.style.opacity='.3';this.style.color='rgb(var(--sub))'" title="Delete project">${ic("trash",13)}</button></td>`:""}
        </tr>`;}).join("")}
      ${isA?`<tr><td></td><td style="padding:0"><div class="ar" style="padding:9px 14px;display:flex;align-items:center;gap:6px;font-size:13px;color:rgb(var(--sub))" onclick="S.form={status:S.data.statuses[0]?.key||'editing_running',priority:'medium',progress:0,revenue:0,editorPayout:0,workspace:'${g.ws.id!=="none"?g.ws.id:""}'};S.modal='project';render()">${ic("plus",13)} Add project</div></td>${"<td></td>".repeat(cols.length+2)}</tr>`:""}</tbody></table></div></div>`;
    });
    if(wsGroups.length===0)h+=`<div class="glass" style="padding:48px;text-align:center;color:rgb(var(--sub))"><div style="opacity:.2;margin-bottom:8px">${ic("film",32)}</div><div style="font-size:13px">No projects found</div></div>`;
  }
  // ─── KANBAN BOARD ───
  else if(S.pView==="board"&&!isC){

// ─── PAYMENTS ───
function rPayments(){
  const ps=S.data.projects;
  const METHODS=["Bank Transfer","PayPal","Wise","Cash","Cheque","Stripe","Other"];
  const totalRev=ps.reduce((s,p)=>s+(p.revenue||0),0);
  const totalPaid=ps.reduce((s,p)=>s+paidTotal(p),0);
  const totalDue=totalRev-totalPaid;
  const paidProjs=ps.filter(p=>p.paymentStatus==="paid").length;
  const partialProjs=ps.filter(p=>p.paymentStatus==="partial").length;
  const unpaidProjs=ps.filter(p=>p.paymentStatus==="unpaid"&&(p.revenue||0)>0).length;

  // Group by month
  const monthMap={};
  ps.forEach(p=>{
    (p.payments||[]).forEach(pay=>{
      const d=new Date(pay.date);
      const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      if(!monthMap[key])monthMap[key]={received:0,count:0,label:d.toLocaleString("en-GB",{month:"long",year:"numeric"})};
      monthMap[key].received+=Number(pay.amount||0);
      monthMap[key].count++;
    });
  });
  const months=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

  // Group by client
  const clientMap={};
  ps.filter(p=>p.clientId).forEach(p=>{
    if(!clientMap[p.clientId])clientMap[p.clientId]={revenue:0,paid:0,projects:[]};
    clientMap[p.clientId].revenue+=(p.revenue||0);
    clientMap[p.clientId].paid+=paidTotal(p);
    clientMap[p.clientId].projects.push(p);
  });

  const payStatusBadge=(st)=>{const cfg={paid:{bg:"52,199,89",label:"PAID"},partial:{bg:"255,159,10",label:"PARTIAL"},unpaid:{bg:"255,59,48",label:"UNPAID"}};const c=cfg[st]||cfg.unpaid;return`<span class="tag" style="background:rgba(${c.bg},.12);color:rgb(${c.bg})">${c.label}</span>`;};

  let h=`<h2 style="margin-bottom:18px;font-size:20px;font-weight:700">Payments & Invoicing</h2>`;

  // Summary cards
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px">
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(52,199,89,.1)">${ic("trending",18,"rgb(52,199,89)")}</div><div><div class="fin-val" style="color:rgb(52,199,89)">${fmt(totalRev)}</div><div class="fin-lbl">Total Invoiced</div></div></div>
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(99,102,241,.1)">${ic("check",18,"rgb(99,102,241)")}</div><div><div class="fin-val" style="color:rgb(99,102,241)">${fmt(totalPaid)}</div><div class="fin-lbl">Total Received</div></div></div>
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(${totalDue>0?"255,59,48":"52,199,89"},.1)">${ic("alert",18,`rgb(${totalDue>0?"255,59,48":"52,199,89"})`)}</div><div><div class="fin-val" style="color:rgb(${totalDue>0?"255,59,48":"52,199,89"})">${fmt(totalDue)}</div><div class="fin-lbl">Outstanding Due</div></div></div>
  <div class="glass" style="padding:16px 18px;display:flex;align-items:center;gap:16px"><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(52,199,89)">${paidProjs}</div><div style="font-size:10px;color:rgb(var(--sub))">Paid</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(255,159,10)">${partialProjs}</div><div style="font-size:10px;color:rgb(var(--sub))">Partial</div></div><div style="text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(255,59,48)">${unpaidProjs}</div><div style="font-size:10px;color:rgb(var(--sub))">Unpaid</div></div></div>
  </div>`;

  // Monthly income breakdown
  if(months.length){
    h+=`<div class="glass" style="padding:0;overflow:hidden;border-radius:14px;margin-bottom:24px">
    <div style="padding:14px 18px;border-bottom:1px solid rgba(var(--brd));font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px">${ic("calendar",15)} Monthly Income Received</div>
    <div class="tbl-wrap"><table class="fin-tbl"><thead><tr><th>Month</th><th>Payments</th><th>Amount Received</th></tr></thead><tbody>
    ${months.map(([k,v])=>`<tr><td style="font-weight:600">${v.label}</td><td>${v.count} payment${v.count>1?"s":""}</td><td style="font-weight:700;color:rgb(52,199,89)">${fmt(v.received)}</td></tr>`).join("")}
    </tbody></table></div></div>`;
  }

  // Per-client payment summary
  h+=`<h3 style="margin-bottom:14px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px">${ic("heart",16,"rgb(6,182,212)")} Payment by Client</h3>`;
  const clientIds=Object.keys(clientMap);
  if(clientIds.length){
    h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px;margin-bottom:24px">${clientIds.map(cid=>{
      const c=gU(cid);const cm=clientMap[cid];const due=cm.revenue-cm.paid;
      return`<div class="glass" style="padding:20px">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">${av(cid,38)}<div style="flex:1"><div style="font-size:14px;font-weight:700">${e(c?.name||"Unknown")}</div><div style="font-size:12px;color:rgb(var(--sub))">${cm.projects.length} project${cm.projects.length>1?"s":""}</div></div></div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px">
          <div style="padding:10px;border-radius:8px;background:rgba(52,199,89,.06);text-align:center"><div style="font-size:16px;font-weight:700;color:rgb(52,199,89)">${fmt(cm.revenue)}</div><div style="font-size:10px;color:rgb(var(--sub))">Invoiced</div></div>
          <div style="padding:10px;border-radius:8px;background:rgba(99,102,241,.06);text-align:center"><div style="font-size:16px;font-weight:700;color:rgb(99,102,241)">${fmt(cm.paid)}</div><div style="font-size:10px;color:rgb(var(--sub))">Received</div></div>
          <div style="padding:10px;border-radius:8px;background:rgba(${due>0?"255,59,48":"52,199,89"},.06);text-align:center"><div style="font-size:16px;font-weight:700;color:rgb(${due>0?"255,59,48":"52,199,89"})">${fmt(due)}</div><div style="font-size:10px;color:rgb(var(--sub))">Due</div></div>
        </div>
        ${cm.projects.map(p=>{const pPaid=paidTotal(p);const pDue=dueAmount(p);
          return`<div style="padding:8px 0;border-top:.5px solid rgba(var(--brd),.5);display:flex;justify-content:space-between;align-items:center">
            <div><div style="font-size:12.5px;font-weight:600">${e(p.eventName)}</div><div style="font-size:11px;color:rgb(var(--sub))">${fmt(p.revenue)} total</div></div>
            <div style="display:flex;align-items:center;gap:8px">${payStatusBadge(p.paymentStatus)}<span style="font-size:12px;font-weight:600;color:rgb(${pDue>0?"255,59,48":"52,199,89"})">${pDue>0?fmt(pDue)+" due":"Settled"}</span></div>
          </div>`;}).join("")}
      </div>`;}).join("")}</div>`;
  }

  // Full project payment table with toggle
  h+=`<h3 style="margin-bottom:14px;font-size:16px;font-weight:700;display:flex;align-items:center;gap:8px">${ic("wallet",16)} All Projects — Payment Details</h3>
  <div class="glass" style="padding:0;overflow:hidden;border-radius:14px"><div class="tbl-wrap"><table class="fin-tbl">
  <thead><tr><th>Project</th><th>Client</th><th>Revenue</th><th>Paid</th><th>Due</th><th>Status</th><th>Actions</th></tr></thead>
  <tbody>${ps.filter(p=>(p.revenue||0)>0).map(p=>{

    return`<tr>

      <td style="font-weight:600">${fmt(p.revenue)}</td>

      <td><button onclick="S.form={payProjId:'${p.id}',payAmount:0,payDate:new Date().toISOString().slice(0,10),payMethod:'Bank Transfer',payBank:'',payNote:''};S.modal='addPayment';render()" class="btn-sm" style="background:rgba(var(--acc),.1);color:rgb(var(--acc));font-size:11px;padding:5px 10px">${ic("plus",12)} Add Payment</button></td>
    </tr>
    ${(p.payments||[]).length?`<tr><td colspan="7" style="padding:0 14px 10px"><div style="margin-left:20px;border-left:2px solid rgba(var(--brd));padding-left:14px">${(p.payments||[]).map(pay=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:.5px solid rgba(var(--brd),.3)">
      <div style="display:flex;align-items:center;gap:8px"><span style="font-weight:600;color:rgb(52,199,89)">${fmt(pay.amount)}</span><span style="font-size:11px;color:rgb(var(--sub))">${new Date(pay.date).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</span><span class="tag" style="background:rgba(var(--acc),.08);color:rgb(var(--acc))">${e(pay.method)}</span>${pay.note?`<span style="font-size:11px;color:rgb(var(--sub))">${e(pay.note)}</span>`:""}</div>

    </div>`).join("")}</div></td></tr>`:""}`;
  }).join("")}</tbody></table></div></div>`;

  return h;

// ─── CLIENTS (with Finance) ───
function rClients(){
  const cl=cls();
  const allP=S.data.projects;

  // Overall client finance summary
  const totalClientRev=allP.filter(p=>p.clientId).reduce((s,p)=>s+(p.revenue||0),0);
  const totalClientProjects=allP.filter(p=>p.clientId).length;

  // Monthly breakdown — group all client projects by month
  const monthMap={};
  allP.filter(p=>p.clientId).forEach(p=>{
    const d=new Date(p.createdAt||p.eventDate);
    const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
    if(!monthMap[key])monthMap[key]={revenue:0,count:0,label:d.toLocaleString("en-GB",{month:"short",year:"numeric"})};
    monthMap[key].revenue+=(p.revenue||0);
    monthMap[key].count++;
  });
  const months=Object.entries(monthMap).sort((a,b)=>b[0].localeCompare(a[0]));

  let h=`<h2 style="margin-bottom:18px;font-size:20px;font-weight:700">Client Finance</h2>`;

  // Top summary
  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:24px">
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(168,85,247,.1)">${ic("heart",18,"rgb(168,85,247)")}</div><div><div class="fin-val" style="color:rgb(168,85,247)">${cl.length}</div><div class="fin-lbl">Total Clients</div></div></div>
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(99,102,241,.1)">${ic("film",18,"rgb(99,102,241)")}</div><div><div class="fin-val" style="color:rgb(99,102,241)">${totalClientProjects}</div><div class="fin-lbl">Client Projects</div></div></div>
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(52,199,89,.1)">${ic("trending",18,"rgb(52,199,89)")}</div><div><div class="fin-val" style="color:rgb(52,199,89)">${fmt(totalClientRev)}</div><div class="fin-lbl">Total Revenue</div></div></div>
  <div class="fin-card glass"><div class="fin-icon" style="background:rgba(255,159,10,.1)">${ic("dollar",18,"rgb(255,159,10)")}</div><div><div class="fin-val" style="color:rgb(255,159,10)">${totalClientProjects?fmt(totalClientRev/totalClientProjects):"—"}</div><div class="fin-lbl">Avg / Project</div></div></div>
  </div>`;

  // Monthly revenue breakdown
  if(months.length){
    h+=`<div class="glass" style="padding:0;overflow:hidden;border-radius:14px;margin-bottom:24px">
    <div style="padding:14px 18px;border-bottom:1px solid rgba(var(--brd));font-weight:700;font-size:14px;display:flex;align-items:center;gap:8px">${ic("calendar",15)} Monthly Revenue from Clients</div>
    <div class="tbl-wrap"><table class="fin-tbl"><thead><tr><th>Month</th><th>Projects</th><th>Revenue</th><th>Avg / Project</th></tr></thead><tbody>
    ${months.map(([k,v])=>`<tr><td style="font-weight:600">${v.label}</td><td>${v.count}</td><td style="font-weight:600;color:rgb(52,199,89)">${fmt(v.revenue)}</td><td>${v.count?fmt(v.revenue/v.count):"—"}</td></tr>`).join("")}
    </tbody></table></div></div>`;
  }

  // Per-client cards with full project breakdown
  h+=`<h3 style="margin-bottom:14px;font-size:16px;font-weight:700">Individual Clients</h3>
  <div class="team-grid">${cl.map(c=>{
    const cp=allP.filter(p=>p.clientId===c.id);
    const totalRev=cp.reduce((s,p)=>s+(p.revenue||0),0);
    const completed=cp.filter(p=>p.status==="done").length;
    const active=cp.filter(p=>p.status!=="done").length;
    const totalExp=cp.reduce((s,p)=>s+projTotalExp(p.id),0);
    const totalPay=cp.reduce((s,p)=>s+(p.editorPayout||0),0);
    const netProfit=totalRev-totalPay-totalExp;

    // Per-month for this client
    const cMonths={};
    cp.forEach(p=>{
      const d=new Date(p.createdAt||p.eventDate);
      const key=d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0");
      if(!cMonths[key])cMonths[key]={rev:0,cnt:0,lbl:d.toLocaleString("en-GB",{month:"short",year:"numeric"})};
      cMonths[key].rev+=(p.revenue||0);cMonths[key].cnt++;
    });
    const cMArr=Object.entries(cMonths).sort((a,b)=>b[0].localeCompare(a[0]));

    return`<div class="glass" style="padding:22px">
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">${av(c.id,44)}<div style="flex:1"><div style="font-size:15px;font-weight:700">${e(c.name)}</div><div style="font-size:12px;color:rgb(var(--sub))">${e(c.email)}</div></div><button onclick="delUser('${c.id}')" style="background:0;border:none;color:rgb(255,59,48);padding:4px">${ic("trash",14)}</button></div>

      <!-- Stats -->
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px">
        <div style="padding:10px;border-radius:8px;background:rgba(52,199,89,.06);text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(52,199,89)">${fmt(totalRev)}</div><div style="font-size:10px;color:rgb(var(--sub))">Revenue</div></div>
        <div style="padding:10px;border-radius:8px;background:rgba(168,85,247,.06);text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(168,85,247)">${cp.length}</div><div style="font-size:10px;color:rgb(var(--sub))">Projects</div></div>
        <div style="padding:10px;border-radius:8px;background:rgba(${netProfit>=0?"52,199,89":"255,59,48"},.06);text-align:center"><div style="font-size:18px;font-weight:700;color:rgb(${netProfit>=0?"52,199,89":"255,59,48"})">${fmt(netProfit)}</div><div style="font-size:10px;color:rgb(var(--sub))">Net Profit</div></div>
      </div>

      <div style="display:flex;gap:8px;margin-bottom:14px">
        <div style="flex:1;padding:8px 10px;border-radius:8px;background:rgba(var(--alt));border:1px solid rgba(var(--brd));text-align:center"><div style="font-size:14px;font-weight:700;color:rgb(var(--acc))">${active}</div><div style="font-size:10px;color:rgb(var(--sub))">Active</div></div>
        <div style="flex:1;padding:8px 10px;border-radius:8px;background:rgba(var(--alt));border:1px solid rgba(var(--brd));text-align:center"><div style="font-size:14px;font-weight:700;color:rgb(52,199,89)">${completed}</div><div style="font-size:10px;color:rgb(var(--sub))">Completed</div></div>
      </div>

      <!-- Monthly breakdown for this client -->
      ${cMArr.length>1?`<div style="margin-bottom:12px;border-top:.5px solid rgba(var(--brd));padding-top:10px"><div style="font-size:10px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;margin-bottom:6px">Monthly Breakdown</div>${cMArr.map(([k,v])=>`<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:12.5px"><span style="color:rgb(var(--sub))">${v.lbl}</span><div style="display:flex;gap:12px"><span style="color:rgb(var(--sub))">${v.cnt} project${v.cnt>1?"s":""}</span><span style="font-weight:600;color:rgb(52,199,89)">${fmt(v.rev)}</span></div></div>`).join("")}</div>`:""}

      <!-- Project list -->
      ${cp.length?`<div style="border-top:.5px solid rgba(var(--brd));padding-top:10px"><div style="font-size:10px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;margin-bottom:6px">All Projects</div>${cp.map(p=>{
        const pExp=projTotalExp(p.id);const pProfit=(p.revenue||0)-(p.editorPayout||0)-pExp;
        return`<div onclick="S.selProj={id:'${p.id}'};render()" style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;cursor:pointer;border-bottom:.5px solid rgba(var(--brd),.3)">
          <div><div style="font-size:12.5px;font-weight:600">${e(p.eventName)}</div><div style="font-size:10px;color:rgb(var(--sub))">${new Date(p.eventDate).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"})}</div></div>
          <div style="text-align:right"><div style="font-size:12.5px;font-weight:600;color:rgb(52,199,89)">${fmt(p.revenue)}</div><div style="font-size:10px;color:rgb(${pProfit>=0?"52,199,89":"255,59,48"})">P/L: ${fmt(pProfit)}</div></div>
        </div>`;}).join("")}</div>`:"<div style='text-align:center;padding:12px;font-size:12px;color:rgb(var(--sub))'>No projects yet</div>"}
    </div>`;}).join("")}
  ${cl.length===0?`<div style="grid-column:1/-1;text-align:center;padding:48px;color:rgb(var(--sub))">${ic("heart",32)}<div style="font-size:13px;margin-top:8px">No clients yet</div></div>`:""}</div>`;
  return h;
}

  h+=`<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:14px">${wss.map(w=>{
    const cnt=S.data.projects.filter(p=>p.workspace===w.id).length;

          <div>${ed?`<input class="col-label-input" id="wsRenamePageInp" value="${e(w.name)}" onblur="renameWorkspace('${w.id}',this.value);S.wsEditing=null;render()" onkeydown="if(event.key==='Enter'){renameWorkspace('${w.id}',this.value);S.wsEditing=null;render()}" style="width:160px;font-size:16px">`:`<div style="font-size:16px;font-weight:700">${e(w.name)}</div>`}

          </div>
        </div>
        <div style="display:flex;gap:4px">
          <button onclick="S.wsEditing=S.wsEditing==='${w.id}'?null:'${w.id}';render()" style="background:0;border:none;color:rgb(var(--sub));padding:5px;cursor:pointer;border-radius:6px;transition:.15s" title="${ed?"Save":"Rename"}">${ic(ed?"check":"edit",14)}</button>
          <button onclick="S.activeWs='${w.id}';S.view='projects';render()" style="background:0;border:none;color:rgb(var(--acc));padding:5px;cursor:pointer;border-radius:6px" title="Open">${ic("eye",14)}</button>
          ${wss.length>1?`<button onclick="if(confirm('Delete \\'${e(w.name)}\\'? Projects will be unassigned.'))deleteWorkspace('${w.id}')" style="background:0;border:none;color:rgb(255,59,48);padding:5px;cursor:pointer;border-radius:6px" title="Delete">${ic("trash",14)}</button>`:""}
        </div>
      </div>
      ${ed?`
        <div style="margin-bottom:14px">
          <div style="font-size:10px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px">Colour</div>
          <div style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:10px">${COLOR_OPTS.map(co=>`<span style="width:26px;height:26px;border-radius:8px;background:rgb(${co});cursor:pointer;border:2.5px solid ${w.color===co?"rgb(var(--text))":"transparent"};transition:.15s" onclick="recolorWorkspace('${w.id}','${co}')"></span>`).join("")}</div>
          <div style="font-size:10px;font-weight:700;color:rgb(var(--sub));text-transform:uppercase;margin-bottom:6px;letter-spacing:.5px">Icon</div>
          <div style="display:flex;gap:5px;flex-wrap:wrap">${["heart","film","briefcase","sparkle","music","calendar","users","play","eye","send","dollar","hdd"].map(ico=>`<span style="width:30px;height:30px;border-radius:8px;background:${w.icon===ico?`rgba(${w.color},.15)`:"rgba(var(--alt))"};border:1.5px solid ${w.icon===ico?`rgb(${w.color})`:"rgba(var(--brd))"};display:inline-flex;align-items:center;justify-content:center;cursor:pointer;transition:.15s" onclick="const ww=getWs('${w.id}');if(ww)ww.icon='${ico}';save();render()">${ic(ico,13,w.icon===ico?`rgb(${w.color})`:"rgb(var(--sub))")}</span>`).join("")}</div>

    </div>`;}).join("")}</div>`;

  // Unassigned projects
  const unassigned=S.data.projects.filter(p=>!p.workspace);
  if(unassigned.length){
    h+=`<div style="margin-top:24px"><h3 style="font-size:15px;font-weight:700;margin-bottom:12px;color:rgb(var(--sub))">Unassigned Projects (${unassigned.length})</h3>

  }
  return h;
}

    return h+`<div class="glass" style="padding:48px;text-align:center;color:rgb(var(--sub))"><div style="opacity:.2;margin-bottom:8px">${ic("bell",32)}</div><div style="font-size:13px">No notifications yet</div></div>`;
  }

  h+=`<div class="glass" style="padding:0;overflow:hidden;border-radius:14px">${notifs.map(n=>{

// ─── MY ROTA (Staff sees ONLY their own) ───
function rMyRota(){
  const uid=S.user.id;
  const m=S.rotaMonth,y=S.rotaYear;
  const records=getUserClockRecords(uid,m,y);
  const leaves=getUserLeaves(uid,m,y);
  const active=getActiveClockIn(uid);
  const totalHrs=records.reduce((s,r)=>s+calcHours(r.clockIn,r.clockOut||new Date().toISOString()),0);
  const daysWorked=new Set(records.map(r=>new Date(r.clockIn).getDate())).size;
  const leaveDays=leaves.filter(l=>l.status==="approved").length;
  const monthName=new Date(y,m).toLocaleString("en-GB",{month:"long",year:"numeric"});
  const daysInMonth=new Date(y,m+1,0).getDate();
  const today=new Date();const isThisMonth=today.getMonth()===m&&today.getFullYear()===y;

  let h=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;flex-wrap:wrap;gap:10px"><h2 style="font-size:20px;font-weight:700">My Rota</h2><button class="btn-sm" style="background:rgba(255,59,48,.1);color:rgb(255,59,48)" onclick="S.form={leaveDate:new Date().toISOString().slice(0,10),leaveType:'urgent'};S.modal='requestLeave';render()">${ic("alert",14)} Request Leave</button></div>`;

  // Clock In/Out with work log
  h+=`<div class="glass" style="padding:20px;margin-bottom:18px">
    <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px;margin-bottom:${active?12:0}px">
      <div><div style="font-size:14px;font-weight:600">Today, ${today.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}</div>
      ${active?`<div style="font-size:13px;color:rgb(52,199,89);margin-top:4px;display:flex;align-items:center;gap:5px"><span style="width:8px;height:8px;border-radius:4px;background:rgb(52,199,89);animation:pulse 1.5s infinite"></span> Clocked in since ${new Date(active.clockIn).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</div>`:`<div style="font-size:13px;color:rgb(var(--sub));margin-top:4px">Not clocked in</div>`}</div>
      ${active?`<button class="clock-btn clock-out-btn" onclick="clockOut()">${ic("clock",16,"white")} Clock Out</button>`:`<button class="clock-btn clock-in-btn" onclick="clockIn()">${ic("clock",16,"white")} Clock In</button>`}
    </div>
    ${active?`<div><div style="font-size:12px;font-weight:600;color:rgb(var(--sub));margin-bottom:4px">What are you working on today?</div><textarea id="workLogInp" placeholder="e.g. Editing ceremony section of Anderson Wedding..." rows="2" style="width:100%;padding:10px 12px;border-radius:10px;border:1px solid rgba(var(--brd));background:rgb(var(--alt));color:rgb(var(--text));font-size:13px;outline:none;resize:none;font-family:inherit" onchange="updateWorkLog('${active.id}',this.value)">${e(active.workLog||"")}</textarea></div>`:""}
  </div>`;
  h+=`<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>`;

  // Pending leave requests
  const pending=leaves.filter(l=>l.status==="pending");
  if(pending.length){
    h+=`<div class="glass" style="padding:16px;margin-bottom:18px;border:1px solid rgba(255,159,10,.15);background:rgba(255,159,10,.03)">
    <div style="font-size:13px;font-weight:700;color:rgb(255,159,10);margin-bottom:8px">${ic("clock",14,"rgb(255,159,10)")} Pending Leave Requests</div>
    ${pending.map(l=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0"><div style="display:flex;align-items:center;gap:8px">${leaveBadge(l.type)}<span style="font-size:13px">${new Date(l.date).toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"short"})}</span>${l.reason?`<span style="font-size:12px;color:rgb(var(--sub))">— ${e(l.reason)}</span>`:""}</div>${leaveStatusBadge(l.status)}</div>`).join("")}</div>`;
  }

  // Month nav
  h+=`<div class="month-nav"><button onclick="prevMonth()">${ic("arrowLeft",16)}</button><h3>${monthName}</h3><button onclick="nextMonth()">${ic("arrowLeft",16,"currentColor").replace('19" y1="12" x2="5"','5" y1="12" x2="19"').replace('12 19 5 12 12 5','12 5 19 12 12 19')}</button></div>`;

  // Summary
  h+=`<div class="rota-summary">
    <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Total Hours</div><div style="font-size:20px;font-weight:700;color:rgb(var(--acc));margin-top:2px">${fmtHrs(totalHrs)}</div></div>
    <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Days Worked</div><div style="font-size:20px;font-weight:700;color:rgb(52,199,89);margin-top:2px">${daysWorked}</div></div>
    <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Leave Days</div><div style="font-size:20px;font-weight:700;color:rgb(255,159,10);margin-top:2px">${leaveDays}</div></div>
    <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Avg / Day</div><div style="font-size:20px;font-weight:700;margin-top:2px">${daysWorked?fmtHrs(totalHrs/daysWorked):"—"}</div></div>
  </div>`;

  // Daily log
  h+=`<div class="glass" style="padding:0;overflow:hidden;border-radius:14px">
  <div style="padding:14px 18px;border-bottom:1px solid rgba(var(--brd));font-weight:700;font-size:14px">Daily Log</div>`;
  for(let d=daysInMonth;d>=1;d--){
    const dayDate=new Date(y,m,d);
    const dayName=dayDate.toLocaleDateString("en-GB",{weekday:"short"});
    const dayRecs=records.filter(r=>new Date(r.clockIn).getDate()===d);
    const dayLeave=getDayLeave(uid,d,m,y);
    const isToday=isThisMonth&&today.getDate()===d;
    if(dayDate>today)continue;
    const dayTotal=dayRecs.reduce((s,r)=>s+calcHours(r.clockIn,r.clockOut||new Date().toISOString()),0);
    h+=`<div class="rota-entry" style="${isToday?"background:rgba(var(--acc),.03)":""}${dayLeave?"background:rgba("+getLeaveType(dayLeave.type).color+",.04)":""}">
      <div style="display:flex;align-items:flex-start;gap:12px;flex:1">
        <div style="width:42px;text-align:center;flex-shrink:0"><div style="font-size:15px;font-weight:700${isToday?";color:rgb(var(--acc))":""}">${d}</div><div style="font-size:10px;color:rgb(var(--sub))">${dayName}</div></div>
        <div style="flex:1">${dayLeave?`<div style="margin-bottom:4px">${leaveBadge(dayLeave.type)} ${leaveStatusBadge(dayLeave.status)} ${dayLeave.reason?`<span style="font-size:12px;color:rgb(var(--sub))">— ${e(dayLeave.reason)}</span>`:""}</div>`:""}${dayRecs.length?dayRecs.map(r=>`<div style="font-size:12.5px;display:flex;align-items:center;gap:6px"><span style="color:rgb(52,199,89)">${new Date(r.clockIn).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span><span style="color:rgb(var(--sub))">→</span><span style="color:${r.clockOut?"rgb(255,59,48)":"rgb(var(--sub))"}">${r.clockOut?new Date(r.clockOut).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"Active..."}</span></div>${r.workLog?`<div class="work-log">${ic("pen",10,"rgb(var(--sub))")} ${e(r.workLog)}</div>`:""}`).join(""):`${dayLeave?"":"<span style='font-size:12px;color:rgb(var(--sub));opacity:.5'>No record</span>"}`}</div>
      </div>
      <div style="font-size:13px;font-weight:600;color:${dayTotal?"rgb(var(--acc))":"rgb(var(--sub))"}; flex-shrink:0">${dayLeave&&!dayTotal?leaveBadge(dayLeave.type):dayTotal?fmtHrs(dayTotal):"—"}</div>
    </div>`;
  }
  h+=`</div>`;
  return h;
}
