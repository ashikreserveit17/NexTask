      <div style="display:flex;gap:6px"><button onclick="approveLeave('${l.id}')" style="padding:5px 12px;border-radius:8px;border:none;background:rgb(52,199,89);color:white;font-size:12px;font-weight:600;cursor:pointer">${ic("check",12,"white")} Approve</button><button onclick="rejectLeave('${l.id}')" style="padding:5px 12px;border-radius:8px;border:none;background:rgb(255,59,48);color:white;font-size:12px;font-weight:600;cursor:pointer">${ic("x",12,"white")} Reject</button></div>
    </div>`;}).join("")}</div>`;
  }

  // Month nav
  h+=`<div class="month-nav"><button onclick="prevMonth()">${ic("arrowLeft",16)}</button><h3>${monthName}</h3><button onclick="nextMonth()">${ic("arrowLeft",16,"currentColor").replace('19" y1="12" x2="5"','5" y1="12" x2="19"').replace('12 19 5 12 12 5','12 5 19 12 12 19')}</button></div>`;

  if(!viewUid){
    h+=`<div class="team-grid">${allStaff.map(u=>{
      const recs=getUserClockRecords(u.id,m,y);
      const totalHrs=recs.reduce((s,r)=>s+calcHours(r.clockIn,r.clockOut||new Date().toISOString()),0);
      const daysWorked=new Set(recs.map(r=>new Date(r.clockIn).getDate())).size;
      const userLeaves=getUserLeaves(u.id,m,y).filter(l=>l.status==="approved").length;
      const active=getActiveClockIn(u.id);
      const lastLog=recs.length?recs.sort((a,b)=>new Date(b.clockIn)-new Date(a.clockIn))[0]:null;
      return`<div class="glass" style="padding:20px;cursor:pointer" onclick="S.rotaViewUser='${u.id}';render()">
        <div style="display:flex;align-items:center;gap:10px;margin-bottom:10px">${av(u.id,40)}<div style="flex:1"><div style="font-size:14px;font-weight:700">${e(u.name)}</div><div style="font-size:12px;color:rgb(var(--sub))">${e(u.department||u.role)}</div></div>
        ${active?`<span style="width:10px;height:10px;border-radius:5px;background:rgb(52,199,89);animation:pulse 1.5s infinite" title="Clocked in"></span>`:""}</div>
        ${lastLog&&lastLog.workLog?`<div style="padding:8px 10px;border-radius:8px;background:rgba(var(--alt));border:1px solid rgba(var(--brd));margin-bottom:10px"><div style="font-size:10px;font-weight:600;color:rgb(var(--sub));text-transform:uppercase;margin-bottom:2px">Latest Update</div><div style="font-size:12px;color:rgb(var(--text));line-height:1.4">${e(lastLog.workLog)}</div></div>`:""}
        <div class="rota-summary" style="margin-bottom:0">
          <div style="padding:8px;border-radius:8px;background:rgba(var(--acc),.06);text-align:center"><div style="font-size:15px;font-weight:700;color:rgb(var(--acc))">${fmtHrs(totalHrs)}</div><div style="font-size:9px;color:rgb(var(--sub))">Hours</div></div>
          <div style="padding:8px;border-radius:8px;background:rgba(52,199,89,.06);text-align:center"><div style="font-size:15px;font-weight:700;color:rgb(52,199,89)">${daysWorked}</div><div style="font-size:9px;color:rgb(var(--sub))">Days</div></div>
          <div style="padding:8px;border-radius:8px;background:rgba(255,159,10,.06);text-align:center"><div style="font-size:15px;font-weight:700;color:rgb(255,159,10)">${userLeaves}</div><div style="font-size:9px;color:rgb(var(--sub))">Leave</div></div>
        </div>
      </div>`;}).join("")}</div>`;
    h+=`<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>`;
  } else {
    const u=gU(viewUid);
    if(!u){S.rotaViewUser=null;return rAdminRota();}
    const records=getUserClockRecords(viewUid,m,y);
    const leaves=getUserLeaves(viewUid,m,y);
    const totalHrs=records.reduce((s,r)=>s+calcHours(r.clockIn,r.clockOut||new Date().toISOString()),0);
    const daysWorked=new Set(records.map(r=>new Date(r.clockIn).getDate())).size;
    const leaveDays=leaves.filter(l=>l.status==="approved").length;
    const daysInMonth=new Date(y,m+1,0).getDate();
    const today=new Date();const isThisMonth=today.getMonth()===m&&today.getFullYear()===y;
    const active=getActiveClockIn(viewUid);

    h+=`<button onclick="S.rotaViewUser=null;render()" style="display:flex;align-items:center;gap:5px;background:0;border:none;color:rgb(var(--acc));font-size:14px;font-weight:500;padding:8px 0;margin-bottom:12px">${ic("arrowLeft",16)} All Staff</button>`;
    h+=`<div class="glass" style="padding:20px;margin-bottom:18px;display:flex;align-items:center;gap:14px;flex-wrap:wrap">
      ${av(viewUid,44)}<div style="flex:1"><div style="font-size:17px;font-weight:700">${e(u.name)}</div><div style="font-size:13px;color:rgb(var(--sub))">${e(u.department||u.role)}</div></div>
      ${active?`<span style="display:flex;align-items:center;gap:6px;font-size:13px;color:rgb(52,199,89);font-weight:600"><span style="width:8px;height:8px;border-radius:4px;background:rgb(52,199,89);animation:pulse 1.5s infinite"></span> Active</span>`:""}
    </div>`;
    h+=`<style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>`;

    h+=`<div class="rota-summary">
      <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Hours</div><div style="font-size:20px;font-weight:700;color:rgb(var(--acc));margin-top:2px">${fmtHrs(totalHrs)}</div></div>
      <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Days</div><div style="font-size:20px;font-weight:700;color:rgb(52,199,89);margin-top:2px">${daysWorked}</div></div>
      <div class="glass" style="padding:14px 16px"><div style="font-size:11px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Leave</div><div style="font-size:20px;font-weight:700;color:rgb(255,159,10);margin-top:2px">${leaveDays}</div></div>
    </div>`;

    h+=`<div class="glass" style="padding:0;overflow:hidden;border-radius:14px">
    <div style="padding:14px 18px;border-bottom:1px solid rgba(var(--brd));font-weight:700;font-size:14px">Daily Log — ${monthName}</div>`;
    for(let d=daysInMonth;d>=1;d--){
      const dayDate=new Date(y,m,d);const dayName=dayDate.toLocaleDateString("en-GB",{weekday:"short"});
      const dayRecs=records.filter(r=>new Date(r.clockIn).getDate()===d);
      const dayLeave=getDayLeave(viewUid,d,m,y);
      const isToday=isThisMonth&&today.getDate()===d;
      if(dayDate>today)continue;
      const dayTotal=dayRecs.reduce((s,r)=>s+calcHours(r.clockIn,r.clockOut||new Date().toISOString()),0);
      h+=`<div class="rota-entry" style="${isToday?"background:rgba(var(--acc),.03)":""}${dayLeave?"background:rgba("+getLeaveType(dayLeave.type).color+",.04)":""}">
        <div style="display:flex;align-items:flex-start;gap:12px;flex:1">
          <div style="width:42px;text-align:center;flex-shrink:0"><div style="font-size:15px;font-weight:700${isToday?";color:rgb(var(--acc))":""}">${d}</div><div style="font-size:10px;color:rgb(var(--sub))">${dayName}</div></div>
          <div style="flex:1">${dayLeave?`<div style="margin-bottom:4px">${leaveBadge(dayLeave.type)} ${leaveStatusBadge(dayLeave.status)} ${dayLeave.reason?`<span style="font-size:12px;color:rgb(var(--sub))">— ${e(dayLeave.reason)}</span>`:""} <button onclick="deleteLeave('${dayLeave.id}')" style="background:0;border:none;color:rgb(var(--sub));opacity:.4;padding:2px;cursor:pointer">${ic("trash",11)}</button></div>`:""}${dayRecs.length?dayRecs.map(r=>`<div style="font-size:12.5px;display:flex;align-items:center;gap:6px"><span style="color:rgb(52,199,89)">${new Date(r.clockIn).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"})}</span><span style="color:rgb(var(--sub))">→</span><span style="color:${r.clockOut?"rgb(255,59,48)":"rgb(var(--sub))"}">${r.clockOut?new Date(r.clockOut).toLocaleTimeString("en-GB",{hour:"2-digit",minute:"2-digit"}):"Active..."}</span>
          <button onclick="event.stopPropagation();adminDelClock('${r.id}')" style="background:0;border:none;color:rgb(var(--sub));padding:2px;opacity:.4" title="Delete">${ic("trash",11)}</button></div>${r.workLog?`<div class="work-log">${ic("pen",10,"rgb(var(--sub))")} ${e(r.workLog)}</div>`:""}`).join(""):`${dayLeave?"":"<span style='font-size:12px;color:rgb(var(--sub));opacity:.5'>No record</span>"}`}</div>
        </div>
        <div style="font-size:13px;font-weight:600;color:${dayTotal?"rgb(var(--acc))":"rgb(var(--sub))"};flex-shrink:0">${dayLeave&&!dayTotal?leaveBadge(dayLeave.type):dayTotal?fmtHrs(dayTotal):"—"}</div>
      </div>`;
    }
    h+=`</div>`;
  }
  return h;
}

// ─── DETAIL ───

    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px">${[{i:"calendar",l:"Event Date",v:new Date(p.eventDate).toLocaleDateString("en-GB",{day:"numeric",month:"long",year:"numeric"})},{i:"clock",l:"Deadline",v:dl.text,ov:dl.over},{i:"pen",l:"Editor",v:ed?ed.name:"Not assigned"},{i:"heart",l:"Client",v:cl?cl.name:"Internal"}].map(it=>`<div style="padding:12px;border-radius:12px;background:rgba(var(--alt));border:1px solid rgba(var(--brd))"><div style="display:flex;align-items:center;gap:5px;margin-bottom:3px">${ic(it.i,12,"rgb(var(--sub))")}<span style="font-size:10px;color:rgb(var(--sub));font-weight:600">${it.l}</span></div><div style="font-size:13px;font-weight:600;color:${it.ov?"rgb(255,59,48)":"inherit"}">${e(it.v)}</div></div>`).join("")}</div>
  </div>

  ${isA?`<!-- Financials -->

      <div style="padding:12px;border-radius:10px;background:rgba(255,159,10,.06);border:1px solid rgba(255,159,10,.1)"><div style="font-size:10px;color:rgb(var(--sub));font-weight:600;text-transform:uppercase">Expenses</div><div style="font-size:18px;font-weight:700;color:rgb(255,159,10);margin-top:2px">${fmt(totalExp)}</div></div>

  </div>`:""

    <div class="comment-input-wrap"><textarea id="ccI" placeholder="${isA?"Reply to "+e((gU(p.clientId)?.name||"client").split(" ")[0])+"...":"Message Reliablesstudio..."}" rows="1"></textarea><button class="comment-send-btn" style="background:linear-gradient(135deg,#06b6d4,#0891b2)" onclick="addClientComment('${p.id}',$('#ccI').value);$('#ccI').value=''">${ic("send",16,"white")}</button></div>
  </div>`:""
  }</div></div>`;
}

// ─── BIND ───
function bind(){
  // Column resize drag
  document.querySelectorAll('.col-resize').forEach(handle=>{
    handle.addEventListener('mousedown',function(ev){
      ev.preventDefault();ev.stopPropagation();
      const th=this.parentElement;
      const colId=this.dataset.colid;
      const startX=ev.clientX;
      const startW=th.offsetWidth;
      this.classList.add('active');
      document.body.style.cursor='col-resize';
      document.body.style.userSelect='none';
      function onMove(e){
        const w=Math.max(80,startW+(e.clientX-startX));
        th.style.width=w+'px';
        if(!S.colWidths)S.colWidths={};
        S.colWidths[colId]=w;
      }
      function onUp(){
        document.removeEventListener('mousemove',onMove);
        document.removeEventListener('mouseup',onUp);
        handle.classList.remove('active');
        document.body.style.cursor='';
        document.body.style.userSelect='';
        save();
      }
      document.addEventListener('mousemove',onMove);
      document.addEventListener('mouseup',onUp);
    });
    // Touch support for mobile/tablet
    handle.addEventListener('touchstart',function(ev){
      ev.preventDefault();ev.stopPropagation();
      const th=this.parentElement;
      const colId=this.dataset.colid;
      const startX=ev.touches[0].clientX;
      const startW=th.offsetWidth;
      this.classList.add('active');
      function onMove(e){
        const w=Math.max(80,startW+(e.touches[0].clientX-startX));
        th.style.width=w+'px';
        if(!S.colWidths)S.colWidths={};
        S.colWidths[colId]=w;
      }
      function onUp(){
        document.removeEventListener('touchmove',onMove);
        document.removeEventListener('touchend',onUp);
        handle.classList.remove('active');
        save();
      }
      document.addEventListener('touchmove',onMove,{passive:false});
      document.addEventListener('touchend',onUp);
    },{passive:false});
  });
  // Close mobile sidebar on nav click
  document.querySelectorAll('.nav-btn').forEach(b=>{b.addEventListener('click',()=>{document.querySelector('.sidebar')?.classList.remove('open');document.querySelector('.sidebar-overlay')?.classList.remove('show');});});
  // Drag & drop for board
  $$(".b-card[draggable]").forEach(c=>{
    c.addEventListener("dragstart",()=>{S.dragItem=S.data.projects.find(p=>p.id===c.dataset.pid);});
    c.addEventListener("dragend",()=>{S.dragItem=null;$$(".board-col").forEach(col=>col.classList.remove("drag-over"));});
  });
  $$(".board-col").forEach(col=>{
    col.addEventListener("dragover",ev=>{ev.preventDefault();col.classList.add("drag-over");});
    col.addEventListener("dragleave",()=>col.classList.remove("drag-over"));
    col.addEventListener("drop",()=>{col.classList.remove("drag-over");if(S.dragItem)updStatus(S.dragItem.id,col.dataset.status);});
  });
  // Comment enter key (team)
  const cmI=document.getElementById("cmI");
  if(cmI){cmI.addEventListener("keydown",ev=>{if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();const pid=S.selProj?.id;if(pid&&cmI.value.trim()){addComment(pid,cmI.value);}}});cmI.addEventListener("input",()=>{cmI.style.height="auto";cmI.style.height=Math.min(cmI.scrollHeight,100)+"px";});}
  const cmL=document.getElementById("cmL");if(cmL)cmL.scrollTop=cmL.scrollHeight;
  // Comment enter key (client)
  const ccI=document.getElementById("ccI");
  if(ccI){ccI.addEventListener("keydown",ev=>{if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();const pid=S.selProj?.id;if(pid&&ccI.value.trim()){addClientComment(pid,ccI.value);}}});ccI.addEventListener("input",()=>{ccI.style.height="auto";ccI.style.height=Math.min(ccI.scrollHeight,100)+"px";});}
  const ccL=document.getElementById("ccL");if(ccL)ccL.scrollTop=ccL.scrollHeight;
  // Login enter
  const le=document.getElementById("le"),lp=document.getElementById("lp");
  [le,lp].forEach(el=>{if(el)el.addEventListener("keydown",ev=>{if(ev.key==="Enter"){S.loginForm.email=document.getElementById("le")?.value||"";S.loginForm.password=document.getElementById("lp")?.value||"";login();}});});
  // Focus col edit
  const colInp=document.querySelector(".col-label-input");if(colInp)colInp.focus();
  // Workspace search & rename autofocus
  const wsS=document.getElementById("wsSearch");if(wsS)wsS.focus();
  const wsR=document.getElementById("wsRenameInp");if(wsR){wsR.focus();wsR.select();}
  const wsRP=document.getElementById("wsRenamePageInp");if(wsRP){wsRP.focus();wsRP.select();}
  // Chat bindings
  const chatMsgs=document.getElementById("chatMsgs");if(chatMsgs)chatMsgs.scrollTop=chatMsgs.scrollHeight;
  const chatInp=document.getElementById("chatInp");
  if(chatInp){
    chatInp.addEventListener("keydown",ev=>{if(ev.key==="Enter"&&!ev.shiftKey){ev.preventDefault();const cid=S.user.role==="client"?S.user.id:S.chatWith;if(cid&&chatInp.value.trim()){sendChat(cid,chatInp.value);chatInp.value="";}}});
    chatInp.addEventListener("input",()=>{chatInp.style.height="auto";chatInp.style.height=Math.min(chatInp.scrollHeight,100)+"px";});
    chatInp.focus();
  }
}

(async function(){await load();render();})();
</script>
</body>
</html>
